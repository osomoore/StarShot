<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StarShot Debug</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>StarShot Debug</h1>
          <p>Local server-authoritative state inspector</p>
        </div>
        <div class="toolbar">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="createButton" type="button">New Red/Blue Game</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar" aria-label="Saved games">
          <div class="panel-header">
            <h2>Games</h2>
            <span id="gameCount">0</span>
          </div>
          <div id="gamesList" class="games-list"></div>
        </aside>

        <section class="inspector" aria-label="Game inspector">
          <div class="control-strip">
  <div class="summary-strip">
    <div>
      <span class="label">Game</span>
      <strong id="selectedGameId">None</strong>
    </div>
    <div>
      <span class="label">Starting Player</span>
      <strong id="startingPlayerValue">-</strong>
    </div>
  </div>
  <div class="actions-row">
    <button id="redOrdersButton" type="button" disabled>Red Demo</button>
    <button id="blueOrdersButton" type="button" disabled>Blue Demo</button>
    <label class="check-control">
      <input id="revealOrdersToggle" type="checkbox" />
      Reveal orders
    </label>
  </div>
</div>

          <div class="play-layout">
            <aside class="player-rail" aria-label="Player ships">
              <div class="panel-header">
                <h2>Ships</h2>
              </div>
              <div id="leftMiniBoards" class="mini-boards-column"></div>
            </aside>

            <section class="play-main">
              <section class="panel board-panel" aria-label="Hex board">
                <div class="panel-header">
      <div>
        <h2>Board</h2>
        <div class="board-info">
          <div><span class="label">Round</span> <strong id="roundValue">-</strong></div>
          <div><span class="label">Phase</span> <strong id="phaseValue">-</strong></div>
        </div>
        <button id="resolveButton" type="button" disabled>Resolve Next Step</button>
      </div>
      <div class="board-controls" aria-label="Board zoom controls">
        <button id="boardZoomOutButton" type="button" aria-label="Zoom out">-</button>
        <button id="boardZoomInButton" type="button" aria-label="Zoom in">+</button>
      </div>
    </div>
                <div class="board-layout-container">
                  <svg id="boardSvg" class="board-svg" role="img" aria-label="StarShot hex board"></svg>
                </div>
              </section>
            </section>

            <aside class="right-rail">
              <section class="panel orders-builder" aria-label="Orders builder">
                <div class="panel-header stacked-header">
                  <h2>Orders</h2>
                  <div class="builder-controls">
                    <label>
                      Player
                      <select id="builderPlayerSelect"></select>
                    </label>
                    <button id="submitBuiltOrdersButton" type="button" disabled>Submit Orders</button>
                  </div>
                </div>
                <div id="ordersBuilderView" class="order-stacks"></div>
                <div class="builder-preview">
                  <span class="label">Generated Orders JSON</span>
                  <pre id="ordersPreview">{}</pre>
                </div>
              </section>
            </aside>
          </div>

          <div class="lower-panels">
            <section class="panel events-panel">
              <div class="panel-header">
                <h2>Events</h2>
              </div>
              <ol id="eventsView" class="events"></ol>
            </section>

            <section class="panel state-panel">
              <div class="panel-header">
                <h2>Raw State</h2>
              </div>
              <pre id="stateJson">{}</pre>
            </section>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
